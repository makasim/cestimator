name: 'Docker Build and Push'

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      packages: 'write'
      contents: 'read'

    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: '${{ matrix.runner }}'

    steps:
      - uses: 'actions/checkout@v4'

      - name: 'Login to GitHub Container Registry'
        uses: 'docker/login-action@v3'
        with:
          registry: 'ghcr.io'
          username: '${{ github.actor }}'
          password: '${{ secrets.GITHUB_TOKEN }}'

      - name: 'Build and push'
        run: |
          IMAGE=ghcr.io/makasim/cestorage
          docker build -t $IMAGE:latest-${{ matrix.arch }} .
          docker push $IMAGE:latest-${{ matrix.arch }}

          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            docker tag $IMAGE:latest-${{ matrix.arch }} $IMAGE:$TAG-${{ matrix.arch }}
            docker push $IMAGE:$TAG-${{ matrix.arch }}
          fi
